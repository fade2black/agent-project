networks:
  agent-net:
    driver: bridge

services:
  agent:
    build:
      context: ../..
      dockerfile: bin/agent_demo/Dockerfile
      target: final
    environment:
      AGENT_TTL: 30
      AGENT_CLEANUP_INTERVAL: 5
      CBBA_PORT: 4005
      CBBA_TIMEOUT: 30
      COMMAND_CONTROL_PORT: 5000
      DISCOVERY_INTERVAL: 10
      DISCOVERY_PORT: 4000
      HTTP_PORT: 8080
    networks:
      - agent-net
  cli:
    container_name: agent-cli
    build:
      context: ../..
      dockerfile: bin/agent_demo/cli.Dockerfile
    environment:
      CBBA_PORT: 4005
      COMMAND_CONTROL_PORT: 5000
    networks:
      - agent-net
    stdin_open: true
    tty: true
    volumes:
      - ./samples:/samples
